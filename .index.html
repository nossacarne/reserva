<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Mesa & Bolo 🎂</title>
    <style>
        :root { --primary: #c0392b; --secondary: #27ae60; --bg: #f4f4f4; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); padding: 20px; color: #333; }
        .container { max-width: 450px; background: #fff; padding: 25px; border-radius: 12px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); margin-top: 0; }
        .campo { margin-bottom: 18px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 14px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .aviso-erro { color: #fff; background: #e74c3c; padding: 10px; border-radius: 6px; font-size: 13px; display: none; margin-bottom: 15px; }
        .card-bolo { background: #f0fff4; border: 2px dashed var(--secondary); padding: 15px; border-radius: 8px; display: none; animation: fadeIn 0.5s; }
        .btn-enviar { width: 100%; padding: 15px; background: #25d366; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-enviar:hover { background: #128c7e; }
        small { color: #666; font-size: 12px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h2>Reserva de Mesa 🍽️</h2>
    
    <div id="msgRestricao" class="aviso-erro">
        ⚠️ Não realizamos reservas de Sex a Dom e Feriados. Atendimento por ordem de chegada (máx 12 pessoas).
    </div>

    <form id="reservaForm">
        <div class="campo">
            <label>Seu Nome:</label>
            <input type="text" id="nome" placeholder="Ex: Elaine Danelli" required>
        </div>

        <div class="campo">
            <label>Data da Reserva:</label>
            <input type="date" id="data" required onchange="validarRegras()">
        </div>

        <div class="campo">
            <label>Nº de Pessoas:</label>
            <input type="number" id="pessoas" min="1" max="50" placeholder="Mínimo 10 p/ bolo" required onchange="validarRegras()">
        </div>

        <div id="secaoBolo" class="card-bolo">
            <h4 style="margin:0 0 10px 0; color: var(--secondary);">🎂 Bolo Cortesia Liberado!</h4>
            <div class="campo">
                <label>Sabor Escolhido:</label>
                <select id="sabor">
                    <option value="Mousse de Coco">Mousse de Coco</option>
                    <option value="Ninho com Morango">Ninho com Morango</option>
                    <option value="Coco com Doce de Leite">Coco com Doce de Leite</option>
                    <option value="Mousse de Chocolate">Mousse de Chocolate</option>
                    <option value="Maracujá com Chocolate">Maracujá com Chocolate</option>
                    <option value="Ninho com Nutella">Ninho com Nutella</option>
                    <option value="Brigadeiro de Chocolate">Brigadeiro de Chocolate</option>
                    <option value="Brigadeiro de Ninho">Brigadeiro de Ninho</option>
                </select>
            </div>
            <div class="campo">
                <label>Quilos Extras? (R$ 95,00/kg):</label>
                <input type="number" id="kgExtra" value="0" min="0">
                <small>* 1kg já é cortesia.</small>
            </div>
        </div>

        <button type="button" class="btn-enviar" onclick="enviarWhatsApp()">
            RESERVAR VIA WHATSAPP 📱
        </button>
    </form>
</div>

<script>
    // Configurações
    const SEU_TELEFONE = "5511967105333"; // COLOQUE SEU NÚMERO AQUI (com DDD)

    function validarRegras() {
        const dataVal = document.getElementById('data').value;
        const pessoas = parseInt(document.getElementById('pessoas').value) || 0;
        const msgRestricao = document.getElementById('msgRestricao');
        const secaoBolo = document.getElementById('secaoBolo');
        const btn = document.querySelector('.btn-enviar');

        if(!dataVal) return;

        const dataObj = new Date(dataVal + 'T12:00:00'); // Evita erro de fuso horário
        const diaSemana = dataObj.getDay(); // 0=Dom, 5=Sex, 6=Sáb

        // Regra de Dias Proibidos
        if ([0, 5, 6].includes(diaSemana)) {
            msgRestricao.style.display = 'block';
            secaoBolo.style.display = 'none';
            btn.style.opacity = '0.5';
            btn.disabled = true;
        } else {
            msgRestricao.style.display = 'none';
            btn.disabled = false;
            btn.style.opacity = '1';
            
            // Regra do Bolo (10+ pessoas)
            secaoBolo.style.display = (pessoas >= 10) ? 'block' : 'none';
        }
    }

    function enviarWhatsApp() {
        const nome = document.getElementById('nome').value;
        const data = document.getElementById('data').value;
        const pessoas = document.getElementById('pessoas').value;
        const secaoBolo = document.getElementById('secaoBolo');
        
        if(!nome || !data || !pessoas) {
            alert("Por favor, preencha todos os campos.");
            return;
        }

        let mensagem = `*Nova Reserva Requisitada*%0A%0A`;
        mensagem += `👤 *Cliente:* ${nome}%0A`;
        mensagem += `📅 *Data:* ${data}%0A`;
        mensagem += `👥 *Pessoas:* ${pessoas}%0A`;

        if (secaoBolo.style.display === 'block') {
            const sabor = document.getElementById('sabor').value;
            const extra = document.getElementById('kgExtra').value;
            mensagem += `%0A🎂 *BOLO CORTESIA LIBERADO*%0A`;
            mensagem += `🍰 *Sabor:* ${sabor}%0A`;
            mensagem += `⚖️ *Extra:* ${extra} kg (Total: ${1 + parseInt(extra)}kg)%0A`;
            mensagem += `⚠️ _Ciente da cobrança se < 10 pessoas._`;
        }

        const url = `https://wa.me/${SEU_TELEFONE}?text=${mensagem}`;
        window.open(url, '_blank');
    }
</script>

</body>
</html>
